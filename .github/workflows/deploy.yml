name: Deploy to Server

on:
  push:
    branches:
      - master  # основная ветка

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Deploy to Server
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'deployer' }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/html' }}
        run: |
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$SERVER_IP "
            cd $DEPLOY_PATH || exit;
            git pull origin main || git clone git@github.com:IgorPetrovi4/nelmioCrud.git $DEPLOY_PATH;
            composer install --no-interaction --prefer-dist --optimize-autoloader;
            php bin/console doctrine:migrations:migrate --no-interaction;
            php bin/console cache:clear --env=prod --no-debug;
          "